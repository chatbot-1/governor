name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type-check
        run: npx tsc --noEmit -p tsconfig.json

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Integration tests (Redis)
        run: npm run test:redis
        env:
          REDIS_URL: redis://127.0.0.1:6379
